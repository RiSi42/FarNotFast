<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1c1c1e">
  <title>FARnotFAST</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js" defer></script>
  <style>
    :root {
      --bg: #1c1c1e;
      --card: #2c2c2e;
      --card2: #3a3a3c;
      --accent: #FC4C02;
      --accent-dim: rgba(252,76,2,0.15);
      --text: #ffffff;
      --text2: #aeaeb2;
      --text3: #636366;
      --border: rgba(255,255,255,0.08);
      --gold: #FFD700;
      --silver: #C0C0C0;
      --bronze: #CD7F32;
      --danger: #ff453a;
      --ok: #59CD90;
      color-scheme: dark;
    }

    * { box-sizing: border-box; }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Barlow, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    body {
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      color: inherit;
      cursor: pointer;
    }

    .hidden { display: none !important; }

    .login {
      min-height: 100dvh;
      padding: max(28px, env(safe-area-inset-top)) 20px max(28px, env(safe-area-inset-bottom));
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 0%, rgba(252,76,2,0.22), transparent 34%),
        linear-gradient(180deg, #242426 0%, var(--bg) 48%, #151516 100%);
    }

    .login__panel {
      width: min(100%, 390px);
      padding: 28px 20px 22px;
      background: rgba(44,44,46,0.88);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.34);
    }

    .brand {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      min-width: 0;
    }

    .brand__name {
      margin: 0;
      font-family: "Barlow Condensed", Barlow, sans-serif;
      font-size: 52px;
      line-height: 0.86;
      font-weight: 800;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .brand__home {
      padding: 0;
      background: transparent;
      text-align: left;
    }

    .login__form {
      margin-top: 28px;
      display: grid;
      gap: 12px;
    }

    .password-row {
      display: grid;
      grid-template-columns: 1fr 48px;
      gap: 10px;
    }

    .password-row input {
      width: 100%;
      height: 48px;
      padding: 0 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
      outline: none;
    }

    .password-row input:focus {
      border-color: rgba(252,76,2,0.7);
      box-shadow: 0 0 0 4px var(--accent-dim);
    }

    .icon-btn {
      display: grid;
      place-items: center;
      width: 48px;
      height: 48px;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-size: 20px;
      font-weight: 700;
    }

    .login__error {
      min-height: 22px;
      margin: 0;
      color: var(--danger);
      font-size: 14px;
      font-weight: 600;
    }

    .shake {
      animation: shake 0.34s linear;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-7px); }
      40% { transform: translateX(7px); }
      60% { transform: translateX(-5px); }
      80% { transform: translateX(5px); }
    }

    .loading {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      background: rgba(28,28,30,0.92);
      backdrop-filter: blur(12px);
    }

    .loader {
      display: grid;
      justify-items: center;
      gap: 14px;
      color: var(--text2);
      font-weight: 600;
    }

    .spinner {
      width: 42px;
      height: 42px;
      border: 4px solid var(--card2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .app {
      min-height: 100dvh;
      padding-bottom: calc(78px + env(safe-area-inset-bottom));
      background: var(--bg);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      height: calc(56px + env(safe-area-inset-top));
      padding: env(safe-area-inset-top) 16px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: rgba(28,28,30,0.92);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(16px);
    }

    .topbar .brand__name {
      font-size: 32px;
      line-height: 0.9;
    }

    .sync {
      display: grid;
      justify-items: end;
      gap: 2px;
      color: var(--text3);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .sync strong {
      color: var(--text2);
      font-family: "Barlow Condensed", Barlow, sans-serif;
      font-size: 16px;
      font-weight: 700;
    }

    .filters {
      position: sticky;
      top: calc(56px + env(safe-area-inset-top));
      z-index: 9;
      background: rgba(28,28,30,0.96);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(16px);
    }

    .filters__toggle {
      width: 100%;
      min-height: 46px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: transparent;
      color: var(--text);
      font-family: "Barlow Condensed", Barlow, sans-serif;
      font-size: 18px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .filters__toggle span {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .pill-count {
      min-width: 23px;
      height: 23px;
      padding: 0 7px;
      display: inline-grid;
      place-items: center;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font-family: Barlow, sans-serif;
      font-size: 12px;
      font-weight: 700;
    }

    .filters__body {
      padding: 0 0 12px;
    }

    .filter-group {
      margin-top: 10px;
      min-width: 0;
    }

    .filter-label {
      margin: 0 16px 7px;
      color: var(--text3);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .chip-row {
      min-width: 0;
      max-width: 100%;
      display: flex;
      gap: 8px;
      padding: 0 16px 4px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    .chip-row::-webkit-scrollbar { display: none; }

    .chip {
      flex: 0 0 auto;
      min-height: 34px;
      padding: 7px 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--card);
      color: var(--text2);
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
    }

    .chip.is-active {
      border-color: rgba(252,76,2,0.9);
      background: var(--accent-dim);
      color: var(--text);
    }

    .dot {
      width: 9px;
      height: 9px;
      flex: 0 0 9px;
      border-radius: 50%;
      background: var(--accent);
    }

    .main {
      width: min(100%, 1040px);
      margin: 0 auto;
      padding: 16px;
      min-width: 0;
    }

    .section-title {
      margin: 0 0 12px;
      font-family: "Barlow Condensed", Barlow, sans-serif;
      font-size: 28px;
      line-height: 1;
      font-weight: 800;
      text-transform: uppercase;
    }

    .stack {
      display: grid;
      gap: 14px;
      min-width: 0;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .card__head {
      min-height: 48px;
      padding: 13px 14px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--border);
    }

    .card__title {
      margin: 0;
      font-family: "Barlow Condensed", Barlow, sans-serif;
      font-size: 22px;
      line-height: 1;
      font-weight: 700;
      text-transform: uppercase;
    }

    .muted {
      color: var(--text2);
    }

    .empty {
      padding: 22px 14px;
      color: var(--text2);
      font-weight: 600;
      text-align: center;
    }

    .rank-list {
      display: grid;
    }

    .rank-row {
      min-height: 56px;
      padding: 10px 14px;
      display: grid;
      grid-template-columns: 36px minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
    }

    .rank-row:last-child {
      border-bottom: 0;
    }

    .rank-pos {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: var(--card2);
      color: var(--text2);
      font-family: "Barlow Condensed", Barlow, sans-serif;
      font-size: 20px;
      font-weight: 800;
    }

    .rank-pos.gold { color: #111; background: var(--gold); }
    .rank-pos.silver { color: #111; background: var(--silver); }
    .rank-pos.bronze { color: #111; background: var(--bronze); }

    .rank-main {
      min-width: 0;
      display: grid;
      gap: 2px;
    }

    .rank-name {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
    }

    .rank-name span:last-child {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .rank-sub {
      color: var(--text3);
      font-size: 12px;
      font-weight: 600;
    }

    .rank-value {
      font-family: "Barlow Condensed", Barlow, sans-serif;
      font-size: 27px;
      font-weight: 800;
      white-space: nowrap;
    }

    .controls {
      display: flex;
      gap: 8px;
      padding: 0 0 14px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .controls::-webkit-scrollbar { display: none; }

    .segmented {
      width: 100%;
      min-width: 0;
      padding: 4px;
      display: grid;
      grid-template-columns: repeat(var(--segments, 2), minmax(0, 1fr));
      gap: 4px;
      border-radius: 8px;
      background: var(--card);
      border: 1px solid var(--border);
    }

    .filters .segmented {
      width: calc(100% - 32px);
      margin: 0 16px;
    }

    .segmented button {
      min-width: 0;
      min-height: 42px;
      padding: 0 5px;
      border-radius: 6px;
      background: transparent;
      color: var(--text2);
      font-weight: 700;
      line-height: 1.05;
      overflow-wrap: anywhere;
    }

    .segmented button.is-active {
      background: var(--accent);
      color: #fff;
    }

    .chart-card {
      padding: 12px;
    }

    .chart-wrap {
      position: relative;
      height: 420px;
      min-height: 320px;
    }

    @media (max-width: 719px) {
      .chart-wrap {
        height: calc(100dvh - 270px);
        min-height: 220px;
      }
    }

    @media (max-height: 500px) {
      .chart-wrap {
        height: calc(100dvh - 130px);
        min-height: 180px;
      }
    }

    .summary {
      margin-bottom: 12px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .summary__item {
      min-width: 0;
      padding: 11px 10px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .summary__label {
      color: var(--text3);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .summary__value {
      margin-top: 3px;
      font-family: "Barlow Condensed", Barlow, sans-serif;
      font-size: 26px;
      line-height: 1;
      font-weight: 800;
      white-space: nowrap;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      min-width: 560px;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 12px 10px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      white-space: nowrap;
    }

    th {
      color: var(--text3);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    td {
      color: var(--text2);
      font-weight: 600;
    }

    td strong {
      color: var(--text);
    }

    .pager {
      padding: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .small-btn {
      min-height: 36px;
      padding: 0 12px;
      border-radius: 8px;
      background: var(--card2);
      color: var(--text);
      font-weight: 700;
    }

    .small-btn:disabled {
      opacity: 0.35;
      cursor: default;
    }

    .badge-grid {
      display: grid;
      gap: 12px;
      min-width: 0;
    }

    .badge-card {
      min-width: 0;
      padding: 14px;
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr);
      gap: 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .badge-emoji {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: var(--card2);
      font-size: 24px;
    }

    .badge-body {
      min-width: 0;
    }

    .badge-title {
      margin: 0;
      min-width: 0;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-family: "Barlow Condensed", Barlow, sans-serif;
      font-size: 22px;
      line-height: 1.05;
      font-weight: 800;
      text-transform: uppercase;
    }

    .badge-title span:first-child {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .badge-winner {
      margin-top: 4px;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
      font-weight: 700;
    }

    .badge-winner span:last-child {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .badge-gag {
      margin: 5px 0 0;
      color: var(--text2);
      font-size: 14px;
      font-weight: 500;
    }

    .badge-help {
      display: inline-grid;
      place-items: center;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--card2);
      border: 1px solid var(--border);
      color: var(--text3);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      flex: 0 0 20px;
    }

    .badge-stat {
      min-width: 0;
      color: var(--accent);
      font-family: "Barlow Condensed", Barlow, sans-serif;
      font-size: 20px;
      font-weight: 800;
      text-align: right;
      overflow-wrap: anywhere;
      white-space: nowrap;
    }

    .heatmap {
      display: grid;
      gap: 14px;
      min-width: 0;
    }

    .month-grid {
      display: grid;
      gap: 12px;
      min-width: 0;
    }

    .month-card {
      min-width: 0;
      padding: 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .month-name {
      margin: 0 0 8px;
      color: var(--text2);
      font-family: "Barlow Condensed", Barlow, sans-serif;
      font-size: 19px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .days-head,
    .days-grid {
      min-width: 0;
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 4px;
    }

    .days-head {
      margin-bottom: 5px;
      color: var(--text3);
      font-size: 10px;
      font-weight: 700;
      text-align: center;
      text-transform: uppercase;
    }

    .day-cell {
      min-width: 0;
      width: 100%;
      aspect-ratio: 1;
      padding: 0;
      border-radius: 4px;
      background: var(--card2);
      border: 1px solid rgba(255,255,255,0.04);
      color: transparent;
      font-size: 0;
      cursor: default;
    }

    .day-cell.is-empty {
      opacity: 0;
    }

    .day-cell.is-active {
      cursor: pointer;
    }

    .legend {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      color: var(--text3);
      font-size: 12px;
      font-weight: 700;
    }

    .legend-box {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      border: 1px solid var(--border);
    }

    .bottom-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 12;
      min-height: calc(64px + env(safe-area-inset-bottom));
      padding: 6px 6px calc(6px + env(safe-area-inset-bottom));
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
      background: rgba(28,28,30,0.94);
      border-top: 1px solid var(--border);
      backdrop-filter: blur(16px);
    }

    .nav-btn {
      min-width: 0;
      min-height: 52px;
      padding: 4px 2px;
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 3px;
      border-radius: 8px;
      background: transparent;
      color: var(--text3);
      font-size: 9px;
      font-weight: 700;
      overflow: hidden;
    }

    .nav-btn > span:not(.nav-btn__icon) {
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .nav-btn__icon {
      font-size: 18px;
      line-height: 1;
    }

    .nav-btn.is-active {
      background: var(--accent-dim);
      color: var(--text);
    }

    .brand__home:focus-visible,
    .nav-btn:focus-visible,
    .chip:focus-visible,
    .small-btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }

    .error-state {
      min-height: 100dvh;
      padding: 32px 18px;
      display: grid;
      place-items: center;
      background: var(--bg);
    }

    .error-state .card {
      width: min(100%, 460px);
      padding: 18px;
    }

    .error-state h1 {
      margin: 0 0 8px;
      font-family: "Barlow Condensed", Barlow, sans-serif;
      font-size: 32px;
      line-height: 1;
      text-transform: uppercase;
    }

    .error-state p {
      margin: 0;
      color: var(--text2);
      font-weight: 600;
    }

    @media (max-width: 719px) {
      .main {
        padding: 12px;
      }

      .badge-grid {
        gap: 10px;
      }

      .badge-card {
        padding: 12px;
        grid-template-columns: 38px minmax(0, 1fr);
        gap: 10px;
      }

      .badge-emoji {
        width: 38px;
        height: 38px;
        font-size: 20px;
      }

      .badge-title {
        font-size: 18px;
        align-items: flex-start;
        flex-wrap: wrap;
      }

      .badge-stat {
        font-size: 17px;
        text-align: left;
        white-space: normal;
      }

      .month-card {
        padding: 8px;
      }

      .days-grid,
      .days-head {
        gap: 2px;
      }

      .day-cell {
        border-radius: 3px;
      }
    }

    @media (min-width: 720px) {
      .main {
        padding: 22px;
      }

      .dashboard-grid {
        display: grid;
        grid-template-columns: 1.05fr 1fr;
        gap: 14px;
      }

      .dashboard-grid .card:nth-child(3) {
        grid-column: 2;
        grid-row: 1 / span 2;
      }

      .badge-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .month-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .chart-wrap {
        height: 500px;
      }
    }

    @media (min-width: 1024px) {
      .month-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }

    .karen-intro {
      padding: 12px 14px;
      margin: 0 0 14px;
      border-radius: 8px;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text2);
      font-size: 13px;
      line-height: 1.45;
    }

    .karen-intro strong { color: var(--text); }

    .karen-group {
      margin-bottom: 10px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .karen-group__header {
      width: 100%;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;

  <script>
    const CSV_URL = '__CSV_URL__';
    const OVERRIDES_CSV_URL = CSV_URL.replace(/sheet=[^&]*/, 'sheet=karen_overrides');
    const OVERRIDES_URL = '__OVERRIDES_URL__';
    const OVERRIDES_TIMEOUT_MS = 8000;
    const EXPECTED_HASH = '7aa87bec09c88c8c6b50e912117053c70fd5ec635df7ea649a786a7789c34702';
    const AUTH_STORAGE_KEY = 'farnotfast:auth';
    const PALETTE = [

    ];

    const now = new Date();
    const currentYear = now.getFullYear();
    const currentMonth = now.getMonth() + 1;
    const state = {
      data: [],
      allRows: [],
      overrideMap: new Map(),

      athletes: [],

      tab: 'classifica',
      filters: {
        period: 'year',

        atleti: new Set(),
        top10: false
      },
      badgeYear: currentYear,
      badgeMonth: currentMonth,
      badgeMode: 'month',
      logPage: 0,
      hmYear: currentYear,
      hmAthlete: 'tutti',
      charts: {},
      filterOpen: false,
      duplicatesExcluded: 0
    };

    const dom = {
      login: document.getElementById('login'),
      loginForm: document.getElementById('loginForm'),
      loginPanel: document.getElementById('loginPanel'),
      password: document.getElementById('password'),
      loginError: document.getElementById('loginError'),
      loading: document.getElementById('loading'),
      errorState: document.getElementById('errorState'),
      errorMessage: document.getElementById('errorMessage'),
      app: document.getElementById('app'),
      filters: document.getElementById('filters'),
      filterToggle: document.getElementById('filterToggle'),
      filterBody: document.getElementById('filterBody'),
      filterArrow: document.getElementById('filterArrow'),
      filterCount: document.getElementById('filterCount'),
      periodFilters: document.getElementById('periodFilters'),
      yearFilters: document.getElementById('yearFilters'),
      monthFilters: document.getElementById('monthFilters'),
      athleteFilters: document.getElementById('athleteFilters'),
      top10Toggle: document.getElementById('top10Toggle'),
      resetFilters: document.getElementById('resetFilters'),
      main: document.getElementById('main'),
      bottomNav: document.getElementById('bottomNav'),
      homeLogo: document.getElementById('homeLogo'),
      rowCount: document.getElementById('rowCount')
    };

    window.addEventListener('DOMContentLoaded', () => {
      dom.loginForm.addEventListener('submit', handleLogin);
      dom.filterToggle.addEventListener('click', () => {
        state.filterOpen = !state.filterOpen;
        renderFilters();
      });
      dom.resetFilters.addEventListener('click', resetFilters);
      dom.top10Toggle.addEventListener('click', () => {
        state.filters.top10 = !state.filters.top10;
        state.logPage = 0;
        render();
      });
      dom.yearFilters.addEventListener('click', onFilterChipClick);
      dom.monthFilters.addEventListener('click', onFilterChipClick);
      dom.athleteFilters.addEventListener('click', onFilterChipClick);
      dom.periodFilters.addEventListener('click', onPeriodFilterClick);
      dom.homeLogo.addEventListener('click', () => {
        state.tab = 'classifica';
        state.logPage = 0;
        render();
      });
      renderNav();
      if (hasSavedLogin()) {
        unlockApp();
      }
    });

    async function handleLogin(event) {
      event.preventDefault();
      dom.loginError.textContent = '';
      const digest = await sha256(dom.password.value);
      if (digest !== EXPECTED_HASH) {
        dom.loginError.textContent = 'Password errata';
        dom.loginPanel.classList.remove('shake');
        void dom.loginPanel.offsetWidth;
        dom.loginPanel.classList.add('shake');
        return;
      }
      dom.password.value = '';
      rememberLogin();
      await unlockApp();
    }

    async function unlockApp() {
      dom.login.classList.add('hidden');
      dom.loading.classList.remove('hidden');
      try {
        await waitForLibraries();
        await loadData();
        dom.loading.classList.add('hidden');
        dom.app.classList.remove('hidden');
        render();
      } catch (error) {
        dom.loading.classList.add('hidden');
        showError(error);
      }
    }

    function hasSavedLogin() {
      try {
        return sessionStorage.getItem(AUTH_STORAGE_KEY) === EXPECTED_HASH;
      } catch (error) {
        return false;
      }
    }

    function rememberLogin() {
      try {
        sessionStorage.setItem(AUTH_STORAGE_KEY, EXPECTED_HASH);
      } catch (error) {
        // If storage is unavailable, the login still works for the current load.
      }
    }

    async function sha256(value) {
      const data = new TextEncoder().encode(value);
      const hashBuffer = await crypto.subtle.digest('SHA-256', data);
      return Array.from(new Uint8Array(hashBuffer)).map(byte => byte.toString(16).padStart(2, '0')).join('');
    }

    function waitForLibraries() {
      return new Promise((resolve, reject) => {
        let tries = 0;
        const timer = window.setInterval(() => {
          tries += 1;
          if (window.Papa && window.Chart) {
            window.clearInterval(timer);
            Chart.defaults.color = '#aeaeb2';
            Chart.defaults.borderColor = 'rgba(255,255,255,0.08)';
            resolve();
          } else if (tries > 120) {
            window.clearInterval(timer);
            reject(new Error('Librerie CDN non caricate'));
          }
        }, 50);
      });
    }

    async function loadData() {
      const bust = `&_=${Date.now()}`;
      const [mainResult, overridesResult] = await Promise.allSettled([
        fetch(CSV_URL, { cache: 'no-store' }).then(r => {
          if (!r.ok) throw new Error('Google Sheet non raggiungibile');
          return r.text();
        }),
        fetch(OVERRIDES_CSV_URL + bust, { cache: 'no-store' }).then(r => r.ok ? r.text() : '')
      ]);
      if (mainResult.status === 'rejected') throw mainResult.reason;
      const parsed = Papa.parse(mainResult.value, { header: false, skipEmptyLines: true });
      if (parsed.errors.length) throw new Error('CSV non leggibile');
      const headers = parsed.data[0] || [];
      const columns = getColumnIndexes(headers);
      const allRows = parsed.data.slice(1).map(row => parseRow(row, columns)).filter(Boolean);
      await assignRowKeys(allRows);
      computeDuplicateFlags(allRows);
      state.allRows = allRows;
      if (overridesResult.status === 'fulfilled') {
        console.log('[Karen] overrides URL:', OVERRIDES_CSV_URL);
        console.log('[Karen] overrides CSV (prime 400 char):', (overridesResult.value || '').slice(0, 400));
        state.overrideMap = parseOverrides(overridesResult.value);
        console.log('[Karen] overrides caricati:', state.overrideMap.size, 'righe');
        const firstKeys = Array.from(state.overrideMap.keys()).slice(0, 3);
        console.log('[Karen] prime 3 chiavi:', firstKeys);
      } else {
        state.overrideMap = new Map();
        console.warn('[Karen] fetch overrides fallito:', overridesResult.reason);
      }
      rebuildActiveRows();
      if (!state.data.length) throw new Error('CSV vuoto');
      buildAthletes();
      setDefaultYears();
      dom.rowCount.textContent = formatInt(state.data.length);
    }

    function rebuildActiveRows() {
      const filtered = state.allRows.filter(row => {
        if (isExcludedAthlete(row.nome)) return false;
        const override = state.overrideMap.get(row.key);
        if (override !== undefined) return override;
        return !row.isDuplicate;
      });
      state.duplicatesExcluded = state.allRows.length - filtered.length;
      state.data = filtered.slice().sort((a, b) => b.date - a.date);
    }

    async function assignRowKeys(rows) {
      const sorted = rows.slice().sort((a, b) => {
        if (a.date - b.date !== 0) return a.date - b.date;
        return a.nome.localeCompare(b.nome);
      });
      const hashCounts = new Map();
      for (const row of sorted) {
        const raw = `${row.dateStr}|${row.nome.trim()}|${row.distanza}|${row.dislivello}|${row.media}`;
        const hash = await sha256(raw);
        const seq = hashCounts.get(hash) || 0;
        hashCounts.set(hash, seq + 1);
        row.key = `${hash}#${seq}`;
      }
    }

    function parseOverrides(csvText) {
      const map = new Map();
      if (!csvText) return map;
      const parsed = Papa.parse(csvText, { header: false, skipEmptyLines: true });
      if (!parsed.data || !parsed.data.length) return map;
      const rows = parsed.data.slice(1);
      const withTs = rows
        .map(row => {
          const key = String(row[0] || '').trim();
          if (!key) return null;
          const includedRaw = String(row[1] || '').trim().toLowerCase();
          const included = includedRaw === 'true' || includedRaw === '1' || includedRaw === 'vero';
          const timestamp = String(row[2] || '').trim();
          return { key, included, timestamp };
        })
        .filter(Boolean)
        .sort((a, b) => a.timestamp.localeCompare(b.timestamp));
      for (const entry of withTs) {
        map.set(entry.key, entry.included);
      }
      return map;
    }

    function getColumnIndexes(headers) {
      const normalized = headers.map(normalizeHeader);
      return {
        dateStr: findColumn(normalized, ['data'], 0),
        anno: findColumn(normalized, ['anno'], 1),
        mese: findColumn(normalized, ['mese'], 2),
        nome: findColumn(normalized, ['nome', 'atleta'], 4),
        dislivello: findColumn(normalized, ['dislivello', 'dplus'], 5),
        distanza: findColumn(normalized, ['distanza', 'km'], 6),
        media: findColumn(normalized, ['media', 'kmh'], 7),
        controllo: findColumn(normalized, ['controllo'], -1),
        duplicate: findColumn(normalized, ['duplicate', 'duplicato', 'duplicati', 'duplicata'], -1)
      };
    }

    function normalizeHeader(value) {
      return String(value || '')
        .trim()
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-z0-9]+/g, '');
    }

    function findColumn(normalizedHeaders, aliases, fallback) {
      const index = normalizedHeaders.findIndex(header => aliases.includes(header));
      return index >= 0 ? index : fallback;
    }

    function getCell(row, index) {
      return index >= 0 ? row[index] : '';
    }

    function isExcludedAthlete(name) {
      const normalized = normalizeHeader(name);
      return EXCLUDED_ATHLETE_MATCHES.some(match => normalized.includes(match));
    }

    function parseRow(row, columns) {
      const dateStr = String(getCell(row, columns.dateStr) || '').trim();
      const nome = String(getCell(row, columns.nome) || '').trim();
      if (!dateStr || !nome) return null;
      const date = new Date(dateStr + 'T12:00:00');
      if (Number.isNaN(date.getTime())) return null;
      const controllo = String(getCell(row, columns.controllo) || '').trim();
      const duplicate = String(getCell(row, columns.duplicate) || '').trim();
      return {
        dateStr,
        date,
        anno: parseInt(getCell(row, columns.anno), 10) || date.getFullYear(),
        mese: parseInt(getCell(row, columns.mese), 10) || date.getMonth() + 1,
        nome,
        dislivello: parseNum(getCell(row, columns.dislivello)),
        distanza: parseNum(getCell(row, columns.distanza)),
        media: parseNum(getCell(row, columns.media)),
        controllo,
        duplicate,
        isDuplicate: isDuplicateFlag(duplicate)
      };
    }

    // Duplicate column: "A" = exact dup, "S" = slow (<7km/h), "N" = near-dup, "0" = unique
    function isDuplicateFlag(value) {
      const v = String(value || '').trim().toUpperCase();
      return v === 'A' || v === 'S' || v === 'N';
    }

    // Replica della formula J del Sheet. Itera le righe in ordine CSV (= ordine Sheet).
    // Per ogni riga calcola flag ∈ {'0','A','N','S'} e parentKey (riga '0' che la origina).
    function computeDuplicateFlags(rows) {
      const DAY = 24 * 60 * 60 * 1000;
      const EPS = 0.01;
      const datesWithin = (a, b, maxDays) => Math.abs(a - b) / DAY <= maxDays;
      const near = (a, b) => Math.abs(a - b) <= EPS;
      for (let i = 0; i < rows.length; i++) {
        const row = rows[i];
        row.computedFlag = '0';
        row.parentKey = null;
        if (row.media > 0 && row.media < 7) {
          row.computedFlag = 'S';
          continue;
        }
        if (i === 0) continue;
        // A: stesso Nome, |Δdata| ≤ 1gg, Dislivello/Distanza/Media esatti
        for (let j = 0; j < i; j++) {
          const prev = rows[j];
          if (prev.computedFlag !== '0') continue;
          if (prev.nome !== row.nome) continue;
          if (!datesWithin(prev.date, row.date, 1)) continue;
          if (!near(prev.dislivello, row.dislivello)) continue;
          if (!near(prev.distanza, row.distanza)) continue;
          if (!near(prev.media, row.media)) continue;
          row.computedFlag = 'A';
          row.parentKey = prev.key;
          break;
        }
        if (row.computedFlag !== '0') continue;
        // N: stesso Nome, |Δdata| ≤ 1gg, ΔDistanza/ΔMedia ≤ 20% min, ΔD+ ≤ max(50, 20% min)
        for (let j = 0; j < i; j++) {
          const prev = rows[j];
          if (prev.computedFlag !== '0') continue;
          if (prev.nome !== row.nome) continue;
          if (!datesWithin(prev.date, row.date, 1)) continue;
          const minDist = Math.min(prev.distanza, row.distanza);
          const minMedia = Math.min(prev.media, row.media);
          const minDplus = Math.min(prev.dislivello, row.dislivello);
          if (Math.abs(prev.distanza - row.distanza) > 0.2 * minDist) continue;
          if (Math.abs(prev.media - row.media) > 0.2 * minMedia) continue;
          if (Math.abs(prev.dislivello - row.dislivello) > Math.max(50, 0.2 * minDplus)) continue;
          row.computedFlag = 'N';
          row.parentKey = prev.key;
          break;
        }
      }
      for (const row of rows) {
        row.isDuplicate = row.computedFlag !== '0';
        row.duplicate = row.computedFlag === '0' ? '' : row.computedFlag;
      }
    }

    function parseNum(s) {
      const str = String(s || '').trim();
      if (!str) return 0;
      const compact = str.replace(/\s+/g, '');
      if (compact.includes('.') && compact.includes(',')) {
        return parseFloat(compact.replace(/\./g, '').replace(',', '.')) || 0;
      }
      if (/^-?\d{1,3}(,\d{3})+$/.test(compact)) {
        return parseFloat(compact.replace(/,/g, '')) || 0;
      }
      if (compact.includes(',')) {
        return parseFloat(compact.replace(',', '.')) || 0;
      }
      if (/^-?\d{1,3}(\.\d{3})+$/.test(compact)) {
        return parseFloat(compact.replace(/\./g, '')) || 0;
      }
      return parseFloat(compact) || 0;
    }

    function buildAthletes() {
      const totals = groupTotals(state.data, row => row.nome);
      const currentYearTotals = groupTotals(state.data.filter(row => row.anno === currentYear), row => row.nome);
      state.athletes = Object.entries(totals)
        .sort((a, b) => {
          const currentDiff = (currentYearTotals[b[0]]?.km || 0) - (currentYearTotals[a[0]]?.km || 0);
          if (currentDiff !== 0) return currentDiff;
          return b[1].km - a[1].km || a[0].localeCompare(b[0]);
        })
        .map(([name]) => name);
      state.athleteColorMap = {};
      state.athletes.forEach((name, index) => {
        state.athleteColorMap[name] = PALETTE[index % PALETTE.length];
      });
    }

    function setDefaultYears() {
      const defaultYear = getDefaultYear();
      state.filters.year = defaultYear;
      if (!getYears().includes(state.badgeYear)) state.badgeYear = defaultYear;
      if (!getYears().includes(state.hmYear)) state.hmYear = defaultYear;
    }

    function showError(error) {
      dom.errorMessage.textContent = error.message || 'Errore imprevisto';
      dom.errorState.classList.remove('hidden');
    }

    function render() {
      destroyCharts();
      renderFilters();
      renderNav();
      dom.main.innerHTML = '';
      if (state.tab === 'classifica') renderClassifica();
      if (state.tab === 'trend') renderTrend();
      if (state.tab === 'uscite') renderUscite();
      if (state.tab === 'log') renderLog();
      if (state.tab === 'badge') renderBadge();
      if (state.tab === 'heatmap') renderHeatmap();
      if (state.tab === 'karen') renderKaren();
      window.scrollTo({ top: 0, behavior: 'instant' });
    }

    function renderNav() {
      dom.bottomNav.innerHTML = TABS.map(([id, icon, label]) => `
        <button class="nav-btn ${state.tab === id ? 'is-active' : ''}" type="button" data-tab="${id}" aria-label="${escapeHtml(label)}">
          <span class="nav-btn__icon">${icon}</span>
          <span>${label}</span>
        </button>
      `).join('');
      dom.bottomNav.querySelectorAll('.nav-btn').forEach(button => {
        button.addEventListener('click', () => {
          state.tab = button.dataset.tab;
          state.logPage = 0;
          render();
        });
      });
    }

    function renderFilters() {
      const hasGlobalFilters = ['trend', 'uscite', 'log'].includes(state.tab);
      dom.filters.classList.toggle('hidden', !hasGlobalFilters);
      if (!hasGlobalFilters) return;
      dom.filterBody.classList.toggle('hidden', !state.filterOpen);
      dom.filterToggle.setAttribute('aria-expanded', String(state.filterOpen));
      dom.filterArrow.textContent = state.filterOpen ? '▲' : '▼';

      const activeCount = getActiveFilterCount();
      dom.filterCount.textContent = String(activeCount);
      dom.filterCount.classList.toggle('hidden', activeCount === 0);

      dom.periodFilters.innerHTML = [
        ['all', 'Sempre'],
        ['12m', 'Ultimi 12 mesi'],
        ['year', 'Anno'],
        ['month', 'Mese']
      ].map(([value, label]) => `<button type="button" class="${state.filters.period === value ? 'is-active' : ''}" data-period="${value}">${escapeHtml(label)}</button>`).join('');
      dom.yearFilters.closest('.filter-group').classList.toggle('hidden', !['month', 'year'].includes(state.filters.period));
      dom.monthFilters.closest('.filter-group').classList.toggle('hidden', state.filters.period !== 'month');
      dom.yearFilters.innerHTML = getYears().map(year => chipHtml(year, state.filters.year === year, { type: 'year', value: year })).join('');
      dom.monthFilters.innerHTML = MONTHS.map((month, index) => chipHtml(month, state.filters.month === index + 1, { type: 'month', value: index + 1 })).join('');
      dom.athleteFilters.innerHTML = state.athletes.map(name => chipHtml(name, state.filters.atleti.has(name), { type: 'athlete', value: name, color: state.athleteColorMap[name] })).join('');
      dom.top10Toggle.classList.toggle('is-active', state.filters.top10);
    }

    function getActiveFilterCount() {
      const defaultYear = getDefaultYear();
      let count = state.filters.atleti.size + (state.filters.top10 ? 1 : 0);
      if (state.filters.period !== 'year' || state.filters.year !== defaultYear) count += 1;
      if (state.filters.period === 'month') count += 1;
      return count;
    }

    function chipHtml(label, active, options = {}) {
      const data = Object.entries(options)
        .filter(([key]) => key !== 'color')
        .map(([key, value]) => `data-${key}="${escapeAttr(value)}"`)
        .join(' ');
      const dot = options.color ? `<span class="dot" style="background:${escapeAttr(options.color)}"></span>` : '';
      return `<button class="chip ${active ? 'is-active' : ''}" type="button" ${data}>${dot}<span>${escapeHtml(label)}</span></button>`;
    }

    function onFilterChipClick(event) {
      const chip = event.target.closest('.chip');
      if (!chip) return;
      const type = chip.dataset.type;
      const value = chip.dataset.value;
      if (type === 'year') state.filters.year = Number(value);
      if (type === 'month') state.filters.month = Number(value);
      if (type === 'athlete') toggleSetValue(state.filters.atleti, value);
      state.logPage = 0;
      render();
    }

    function onPeriodFilterClick(event) {
      const button = event.target.closest('[data-period]');
      if (!button) return;
      state.filters.period = button.dataset.period;
      state.logPage = 0;
      render();
    }

    function toggleSetValue(set, value) {
      if (set.has(value)) set.delete(value);
      else set.add(value);
    }

    function resetFilters() {
      state.filters.period = 'year';
      state.filters.year = getDefaultYear();
      state.filters.month = currentMonth;
      state.filters.atleti.clear();
      state.filters.top10 = false;
      state.logPage = 0;
      render();
    }

    function getFilteredData() {
      const periodFiltered = getPeriodFilteredRows(state.data, state.filters.period, state.filters.year, state.filters.month);
      let allowedTop = null;
      if (state.filters.top10) {
        allowedTop = new Set(Object.entries(groupTotals(periodFiltered, row => row.nome))
          .sort((a, b) => b[1].km - a[1].km || a[0].localeCompare(b[0]))
          .slice(0, 10)
          .map(([name]) => name));
      }
      return periodFiltered.filter(row => {
        if (allowedTop && !allowedTop.has(row.nome)) return false;
        if (state.filters.atleti.size && !state.filters.atleti.has(row.nome)) return false;
        return true;
      });
    }

    function getPeriodFilteredRows(rows, period, year, month) {
      if (period === 'month') return rows.filter(row => row.anno === year && row.mese === month);
      if (period === 'year') return rows.filter(row => row.anno === year);
      if (period === '12m') {
        if (!rows.length) return [];
        const sorted = [...rows].sort((a, b) => a.date - b.date);
        const latest = sorted[sorted.length - 1];
        const start = new Date(latest.anno, latest.mese - 12, 1);
        return rows.filter(row => row.date >= start && row.date <= latest.date);
      }
      return rows;
    }

    function renderClassifica() {
      dom.main.innerHTML = `
        <h2 class="section-title">Classifica</h2>
        <div class="dashboard-grid stack">
          ${topCard('Top 5 mese corrente', state.data.filter(row => row.anno === currentYear && row.mese === currentMonth))}
          ${topCard('Top 5 anno corrente', state.data.filter(row => row.anno === currentYear))}
          ${championsCard()}
        </div>
      `;
    }

    function championsCard() {
      const pastYears = getYears().filter(year => year !== currentYear).sort((a, b) => b - a);
      const rows = pastYears.map((year, index) => {
        const entries = Object.entries(groupTotals(state.data.filter(row => row.anno === year), row => row.nome))
          .sort((a, b) => b[1].km - a[1].km || a[0].localeCompare(b[0]));
        if (!entries.length) return '';
        const [name, total] = entries[0];
        return rankRow({
          pos: index === 0 ? '👑' : String(year).slice(2),
          name,
          sub: String(year),
          value: `${formatInt(total.km)} km`,
          color: state.athleteColorMap[name],
          accent: index === 0
        });
      }).join('');
      return `
        <article class="card">
          <div class="card__head"><h3 class="card__title">Campioni per anno</h3></div>
          <div class="rank-list">${rows || emptyHtml('Nessun anno passato')}</div>
        </article>
      `;
    }

    function topCard(title, rows) {
      const totals = Object.entries(groupTotals(rows, row => row.nome))
        .sort((a, b) => b[1].km - a[1].km || a[0].localeCompare(b[0]))
        .slice(0, 5);
      const html = totals.map(([name, total], index) => rankRow({
        pos: medal(index),
        medalClass: index === 0 ? 'gold' : index === 1 ? 'silver' : index === 2 ? 'bronze' : '',
        name,
        sub: `${formatInt(total.count)} uscite`,
        value: `${formatInt(total.km)} km`,
        color: state.athleteColorMap[name]
      })).join('');
      return `
        <article class="card">
          <div class="card__head"><h3 class="card__title">${escapeHtml(title)}</h3></div>
          <div class="rank-list">${html || emptyHtml('Nessun dato')}</div>
        </article>
      `;
    }

    function rankRow({ pos, medalClass = '', name, sub, value, color, accent = false }) {
      return `
        <div class="rank-row">
          <div class="rank-pos ${medalClass}" ${accent ? 'style="color:#fff;background:var(--accent)"' : ''}>${escapeHtml(pos)}</div>
          <div class="rank-main">
            <div class="rank-name">
              <span class="dot" style="background:${escapeAttr(color || '#FC4C02')}"></span>
              <span>${escapeHtml(name)}</span>
            </div>
            <div class="rank-sub">${escapeHtml(sub)}</div>
          </div>
          <div class="rank-value">${escapeHtml(value)}</div>
        </div>
      `;
    }

    function medal(index) {
      if (index === 0) return '1';
      if (index === 1) return '2';
      if (index === 2) return '3';
      return String(index + 1);
    }

    function renderTrend() {
      dom.main.innerHTML = `
        <h2 class="section-title">Trend</h2>
        <div class="card chart-card">
          <div class="chart-wrap"><canvas id="trendChart"></canvas></div>
        </div>
      `;
      drawTrendChart();
    }

    function drawTrendChart() {
      const data = getFilteredData();
      const buckets = getTrendBuckets(data);
      const labels = buckets.map(bucket => bucket.label);
      const visibleAthletes = state.athletes.filter(name => data.some(row => row.nome === name));
      const datasets = visibleAthletes.map(name => ({
        label: name,
        data: buckets.map(bucket => {
          const rows = data.filter(row => {
            if (bucket.dateStr) return row.nome === name && row.dateStr === bucket.dateStr;
            if (row.nome !== name || row.anno !== bucket.year) return false;
            return bucket.month ? row.mese === bucket.month : true;
          });
          const total = rows.reduce((sum, row) => sum + row.distanza, 0);
          return total ? Number(total.toFixed(1)) : null;
        }),
        borderColor: state.athleteColorMap[name],
        backgroundColor: state.athleteColorMap[name],
        pointRadius: 3,
        pointHoverRadius: 5,
        borderWidth: 2,
        tension: 0.28,
        spanGaps: false
      }));
      const ctx = document.getElementById('trendChart');
      state.charts.trend = new Chart(ctx, {
        type: 'line',
        data: { labels, datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { position: 'bottom', labels: { boxWidth: 12, usePointStyle: true } },
            tooltip: { enabled: false }
          },
          scales: {
            x: { grid: { display: false }, ticks: { maxRotation: 0, autoSkip: true } },
            y: { beginAtZero: true, title: { display: true, text: 'Km' } }
          }
        }
      });
    }

    function getTrendBuckets(data) {
      if (!data.length) return [];
      if (state.filters.period === 'all') {
        const sorted = [...data].sort((a, b) => a.date - b.date);
        return [...new Set(sorted.map(row => row.anno))]
          .sort((a, b) => a - b)
          .map(year => ({ year, month: null, label: String(year) }));
      }
      if (state.filters.period === 'month') {
        const days = new Date(state.filters.year, state.filters.month, 0).getDate();
        return Array.from({ length: days }, (_, index) => {
          const day = index + 1;
          return {
            year: state.filters.year,
            month: state.filters.month,
            day,
            dateStr: `${state.filters.year}-${String(state.filters.month).padStart(2, '0')}-${String(day).padStart(2, '0')}`,
            label: String(day)
          };
        });
      }
      if (state.filters.period === 'year') {
        return MONTHS.map((month, index) => ({
          year: state.filters.year,
          month: index + 1,
          label: `${month} ${state.filters.year}`
        }));
      }
      const sorted = [...data].sort((a, b) => a.date - b.date);
      const latest = sorted[sorted.length - 1];
      const buckets = [];
      for (let i = 11; i >= 0; i -= 1) {
        const date = new Date(latest.anno, latest.mese - 1 - i, 1);
        const year = date.getFullYear();
        const month = date.getMonth() + 1;
        buckets.push({ year, month, label: `${MONTHS[month - 1]} ${year}` });
      }
      return buckets;
    }

    function renderUscite() {
      dom.main.innerHTML = `
        <h2 class="section-title">Uscite</h2>
        <div class="card chart-card">
          <div class="chart-wrap"><canvas id="bubbleChart"></canvas></div>
        </div>
      `;
      drawBubbleChart();
    }

    function drawBubbleChart() {
      const data = getFilteredData();
      const athleteStats = buildUsciteStats(data);
      const speeds = athleteStats.map(item => item.avgSpeed).filter(Boolean);
      const min = Math.min(...speeds, 0);
      const max = Math.max(...speeds, 0);
      const datasets = athleteStats.map(item => ({
        label: item.name,
        data: [{
          x: Number(item.km.toFixed(2)),
          y: Math.round(item.dplus),
          r: speedRadius(item.avgSpeed, min, max),
          raw: item
        }],
        backgroundColor: hexToRgba(state.athleteColorMap[item.name], 0.58),
        borderColor: state.athleteColorMap[item.name],
        borderWidth: 1.5
      }));
      const ctx = document.getElementById('bubbleChart');
      state.charts.bubble = new Chart(ctx, {
        type: 'bubble',
        data: { datasets },
        plugins: [bubbleInitialsPlugin],
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: context => {
                  const item = context.raw.raw;
                  return `${item.name}: ${formatKm(item.km)} km, ${formatInt(item.dplus)} D+, ${formatKm(item.avgSpeed)} km/h, ${formatInt(item.count)} uscite`;
                }
              }
            }
          },
          scales: {
            x: { beginAtZero: true, title: { display: true, text: 'Km' } },
            y: { beginAtZero: true, title: { display: true, text: 'D+' } }
          }
        }
      });
    }

    function buildUsciteStats(rows) {
      const grouped = {};
      rows.forEach(row => {
        if (!grouped[row.nome]) grouped[row.nome] = { name: row.nome, km: 0, dplus: 0, speedSum: 0, count: 0, avgSpeed: 0 };
        grouped[row.nome].km += row.distanza;
        grouped[row.nome].dplus += row.dislivello;
        grouped[row.nome].speedSum += row.media;
        grouped[row.nome].count += 1;
      });
      return state.athletes
        .map(name => grouped[name])
        .filter(Boolean)
        .map(item => ({ ...item, avgSpeed: item.count ? item.speedSum / item.count : 0 }));
    }

    function speedRadius(speed, min, max) {
      if (!speed || max <= min) return 13;
      return 13 + ((speed - min) / (max - min)) * 15;
    }

    const bubbleInitialsPlugin = {
      id: 'bubbleInitials',
      afterDatasetsDraw(chart) {
        const { ctx } = chart;
        ctx.save();
        chart.data.datasets.forEach((dataset, datasetIndex) => {
          const meta = chart.getDatasetMeta(datasetIndex);
          if (meta.hidden) return;
          meta.data.forEach((element, index) => {
            const item = dataset.data[index]?.raw;
            if (!item) return;
            const radius = element.options.radius || 13;
            const fontSize = Math.max(10, Math.min(15, radius * 0.9));
            ctx.font = `700 ${fontSize}px Barlow, sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.lineWidth = 3;
            ctx.strokeStyle = 'rgba(0,0,0,0.42)';
            ctx.fillStyle = '#fff';
            const initials = getInitials(item.name);
            ctx.strokeText(initials, element.x, element.y);
            ctx.fillText(initials, element.x, element.y);
          });
        });
        ctx.restore();
      }
    };

    function getInitials(name) {
      const parts = String(name || '').trim().split(/\s+/).filter(Boolean);
      if (!parts.length) return '';
      if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
      return parts.slice(0, 2).map(part => part[0]).join('').toUpperCase();
    }

    function renderLog() {
      const data = getFilteredData().sort((a, b) => b.date - a.date);
      const perPage = 50;
      const totalPages = Math.max(1, Math.ceil(data.length / perPage));
      state.logPage = Math.min(state.logPage, totalPages - 1);
      const pageRows = data.slice(state.logPage * perPage, (state.logPage + 1) * perPage);
      const totalKm = data.reduce((sum, row) => sum + row.distanza, 0);
      const totalDplus = data.reduce((sum, row) => sum + row.dislivello, 0);
      dom.main.innerHTML = `
        <h2 class="section-title">Log</h2>
        <div class="summary">
          <div class="summary__item"><div class="summary__label">Uscite</div><div class="summary__value">${formatInt(data.length)}</div></div>
          <div class="summary__item"><div class="summary__label">Km</div><div class="summary__value">${formatKm(totalKm)}</div></div>
          <div class="summary__item"><div class="summary__label">D+</div><div class="summary__value">${formatInt(totalDplus)}</div></div>
        </div>
        <article class="card">
          <div class="table-wrap">
            <table>
              <thead>
                <tr><th>Data</th><th>Atleta</th><th>Km</th><th>D+</th><th>Km/h</th></tr>
              </thead>
              <tbody>
                ${pageRows.map(row => `
                  <tr>
                    <td>${escapeHtml(formatDate(row.date))}</td>
                    <td><strong>${escapeHtml(row.nome)}</strong></td>
                    <td>${formatKm(row.distanza)}</td>
                    <td>${formatInt(row.dislivello)}</td>
                    <td>${formatKm(row.media)}</td>
                  </tr>
                `).join('') || `<tr><td colspan="5">${emptyHtml('Nessun dato')}</td></tr>`}
              </tbody>
            </table>
          </div>
          <div class="pager">
            <button class="small-btn" type="button" id="prevPage" ${state.logPage === 0 ? 'disabled' : ''}>Indietro</button>
            <span class="muted">${state.logPage + 1} / ${totalPages}</span>
            <button class="small-btn" type="button" id="nextPage" ${state.logPage >= totalPages - 1 ? 'disabled' : ''}>Avanti</button>
          </div>
        </article>
      `;
      document.getElementById('prevPage').addEventListener('click', () => {
        state.logPage = Math.max(0, state.logPage - 1);
        renderLog();
      });
      document.getElementById('nextPage').addEventListener('click', () => {
        state.logPage = Math.min(totalPages - 1, state.logPage + 1);
        renderLog();
      });
    }

    function renderBadge() {
      const years = getYears();
      const badgeRows = getBadgeRows();
      const stats = buildBadgeStats(badgeRows);
      const results = BADGES.map(badge => ({ ...badge, ...badgeWinner(badge.id, stats) }));
      dom.main.innerHTML = `
        <h2 class="section-title">Badge</h2>
        <div class="stack">
          <div class="segmented" style="--segments:4" role="group" aria-label="Periodo badge">
            <button type="button" class="${state.badgeMode === 'all' ? 'is-active' : ''}" data-badge-mode="all">Sempre</button>
            <button type="button" class="${state.badgeMode === '12m' ? 'is-active' : ''}" data-badge-mode="12m">Ultimi 12 mesi</button>
            <button type="button" class="${state.badgeMode === 'year' ? 'is-active' : ''}" data-badge-mode="year">Anno</button>
            <button type="button" class="${state.badgeMode === 'month' ? 'is-active' : ''}" data-badge-mode="month">Mese</button>
          </div>
          ${state.badgeMode === 'month' ? `
            <div class="filter-group">
              <p class="filter-label">Mese</p>
              <div id="badgeMonths" class="chip-row">${MONTHS.map((month, index) => chipHtml(month, state.badgeMonth === index + 1, { month: index + 1 })).join('')}</div>
            </div>
          ` : ''}
          ${['month', 'year'].includes(state.badgeMode) ? `
            <div class="filter-group">
              <p class="filter-label">Anno</p>
              <div id="badgeYears" class="chip-row">${years.map(year => chipHtml(year, state.badgeYear === year, { year })).join('')}</div>
            </div>
          ` : ''}
          <div class="badge-grid">
            ${results.map(badgeCard).join('')}
          </div>
        </div>
      `;
      dom.main.querySelectorAll('.badge-help').forEach(button => {
        button.addEventListener('click', () => alert(button.dataset.help));
      });
      dom.main.querySelectorAll('[data-badge-mode]').forEach(button => {
        button.addEventListener('click', () => {
          state.badgeMode = button.dataset.badgeMode;
          render();
        });
      });
      const monthSelect = document.getElementById('badgeMonths');
      if (monthSelect) {
        monthSelect.addEventListener('click', event => {
          const chip = event.target.closest('.chip');
          if (!chip) return;
          state.badgeMonth = Number(chip.dataset.month);
          render();
        });
      }
      const yearSelect = document.getElementById('badgeYears');
      if (yearSelect) {
        yearSelect.addEventListener('click', event => {
          const chip = event.target.closest('.chip');
          if (!chip) return;
          state.badgeYear = Number(chip.dataset.year);
          render();
        });
      }
    }

    function getBadgeRows() {
      if (state.badgeMode === 'month') {
        return state.data.filter(row => row.anno === state.badgeYear && row.mese === state.badgeMonth);
      }
      if (state.badgeMode === 'year') {
        return state.data.filter(row => row.anno === state.badgeYear);
      }
      if (state.badgeMode === '12m') {
        if (!state.data.length) return [];
        const sorted = [...state.data].sort((a, b) => a.date - b.date);
        const latest = sorted[sorted.length - 1];
        const start = new Date(latest.anno, latest.mese - 12, 1);
        return state.data.filter(row => row.date >= start && row.date <= latest.date);
      }
      return state.data;
    }

    function buildBadgeStats(rows) {
      const grouped = {};
      state.athletes.forEach(name => {
        grouped[name] = { name, rows: [], km: 0, dplus: 0, avgSpeed: 0, count: 0, maxKmSingle: 0, maxDplusPerKm: 0, cv: Infinity };
      });
      rows.forEach(row => {
        const item = grouped[row.nome] || { name: row.nome, rows: [], km: 0, dplus: 0, avgSpeed: 0, count: 0, maxKmSingle: 0, maxDplusPerKm: 0, cv: Infinity };
        item.rows.push(row);
        item.km += row.distanza;
        item.dplus += row.dislivello;
        item.count += 1;
        item.maxKmSingle = Math.max(item.maxKmSingle, row.distanza);
        item.maxDplusPerKm = Math.max(item.maxDplusPerKm, row.distanza ? row.dislivello / row.distanza : 0);
        grouped[row.nome] = item;
      });
      Object.values(grouped).forEach(item => {
        if (!item.count) return;
        item.avgSpeed = item.rows.reduce((sum, row) => sum + row.media, 0) / item.count;
        const mean = item.km / item.count;
        const variance = item.rows.reduce((sum, row) => sum + Math.pow(row.distanza - mean, 2), 0) / item.count;
        item.cv = mean ? Math.sqrt(variance) / mean : Infinity;
      });
      return Object.values(grouped);
    }

    function badgeWinner(id, stats) {
      const active = stats.filter(item => item.count > 0);
      const pickMax = (items, getter) => sortByStat(items, getter, 'desc')[0];
      const pickMin = (items, getter) => sortByStat(items, getter, 'asc')[0];
      let winner;
      if (id === 'komye') winner = pickMax(active, item => item.avgSpeed);
      if (id === 'postino') winner = pickMax(active, item => item.km);
      if (id === 'sisifo') winner = pickMax(active, item => item.dplus);
      if (id === 'forrest') winner = pickMax(active, item => item.count);
      if (id === 'fred') winner = pickMin(active, item => item.count);
      if (id === 'pianop') winner = pickMin(active.filter(item => item.count >= 2), item => item.avgSpeed);
      if (id === 'yolo') winner = pickMax(active, item => item.maxKmSingle);
      if (id === 'rambo') winner = pickMax(active, item => item.maxDplusPerKm);
      if (id === 'roccia') winner = pickMin(active.filter(item => item.count >= 3), item => item.cv);
      if (id === 'ghost') {
        const ghosts = stats.filter(item => item.count === 0).map(item => item.name);
        return {
          names: ghosts,
          stat: ghosts.length ? `${formatInt(ghosts.length)} ghost` : 'Nessuno'
        };
      }
      return {
        names: winner ? [winner.name] : [],
        stat: winner ? badgeStat(id, winner) : 'Nessuno'
      };
    }

    function sortByStat(items, getter, direction) {
      return [...items].sort((a, b) => {
        const diff = getter(a) - getter(b);
        if (diff !== 0) return direction === 'desc' ? -diff : diff;
        return a.name.localeCompare(b.name);
      });
    }

    function badgeStat(id, item) {
      if (id === 'komye' || id === 'pianop') return `${formatKm(item.avgSpeed)} km/h`;
      if (id === 'postino') return `${formatKm(item.km)} km`;
      if (id === 'sisifo') return `${formatInt(item.dplus)} D+`;
      if (id === 'forrest' || id === 'fred') return `${formatInt(item.count)} uscite`;
      if (id === 'yolo') return `${formatKm(item.maxKmSingle)} km`;
      if (id === 'rambo') return `${formatKm(item.maxDplusPerKm)} D+/km`;
      if (id === 'roccia') return `${formatKm(item.cv)} CV`;
      return '';
    }

    function badgeCard(badge) {
      const names = badge.names.length ? badge.names.join(', ') : 'Nessuno';
      const first = badge.names[0];
      const color = first ? state.athleteColorMap[first] : 'var(--text3)';
      return `
        <article class="badge-card">
          <div class="badge-emoji">${badge.emoji}</div>
          <div class="badge-body">
            <h3 class="badge-title"><span>${escapeHtml(badge.name)} <button class="badge-help" type="button" data-help="${escapeAttr(badge.help)}" aria-label="Info">?</button></span><span class="badge-stat">${escapeHtml(badge.stat)}</span></h3>
            <div class="badge-winner">
              <span class="dot" style="background:${escapeAttr(color)}"></span>
              <span>${escapeHtml(names)}</span>
            </div>
            <p class="badge-gag">${escapeHtml(badge.gag)}</p>
          </div>
        </article>
      `;
    }

    function renderHeatmap() {
      const years = getYears();
      const heat = buildHeatmapData();
      dom.main.innerHTML = `
        <h2 class="section-title">Heatmap</h2>
        <div class="heatmap">
          <div class="filter-group">
            <p class="filter-label">Anno</p>
            <div id="hmYears" class="chip-row">${years.map(year => chipHtml(year, state.hmYear === year, { year })).join('')}</div>
          </div>
          <div class="filter-group">
            <p class="filter-label">Atleta</p>
            <div id="hmAthletes" class="chip-row">
              ${chipHtml('Tutti', state.hmAthlete === 'tutti', { athlete: 'tutti' })}
              ${state.athletes.map(name => chipHtml(name, state.hmAthlete === name, { athlete: name, color: state.athleteColorMap[name] })).join('')}
            </div>
          </div>
          <div class="month-grid">
            ${MONTHS.map((month, index) => monthHeatmap(month, index + 1, heat)).join('')}
          </div>
          <div class="legend">
            <span>0</span>
            ${[0, 0.25, 0.5, 0.75, 1].map(value => `<span class="legend-box" style="background:${heatColor(value)}"></span>`).join('')}
            <span>max</span>
          </div>
        </div>
      `;
      document.getElementById('hmYears').addEventListener('click', event => {
        const chip = event.target.closest('.chip');
        if (!chip) return;
        state.hmYear = Number(chip.dataset.year);
        render();
      });
      document.getElementById('hmAthletes').addEventListener('click', event => {
        const chip = event.target.closest('.chip');
        if (!chip) return;
        state.hmAthlete = chip.dataset.athlete;
        render();
      });
      dom.main.querySelectorAll('.day-cell.is-active').forEach(cell => {
        cell.addEventListener('click', () => {
          alert(`${cell.dataset.date}\n${formatKm(Number(cell.dataset.km))} km\n${cell.dataset.count} uscite`);
        });
      });
    }

    function buildHeatmapData() {
      const rows = state.data.filter(row => {
        if (row.anno !== state.hmYear) return false;
        if (state.hmAthlete !== 'tutti' && row.nome !== state.hmAthlete) return false;
        return true;
      });
      const byDay = {};
      rows.forEach(row => {
        if (!byDay[row.dateStr]) byDay[row.dateStr] = { km: 0, count: 0 };
        byDay[row.dateStr].km += row.distanza;
        byDay[row.dateStr].count += 1;
      });
      const maxKm = Math.max(...Object.values(byDay).map(item => item.km), 0);
      return { byDay, maxKm };
    }

    function monthHeatmap(label, month, heat) {
      const first = new Date(state.hmYear, month - 1, 1);
      const days = new Date(state.hmYear, month, 0).getDate();
      const mondayOffset = (first.getDay() + 6) % 7;
      const cells = [];
      for (let i = 0; i < mondayOffset; i += 1) cells.push('<div class="day-cell is-empty"></div>');
      for (let day = 1; day <= days; day += 1) {
        const date = `${state.hmYear}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const item = heat.byDay[date] || { km: 0, count: 0 };
        const intensity = heat.maxKm ? item.km / heat.maxKm : 0;
        const active = item.km > 0;
        cells.push(`
          <button class="day-cell ${active ? 'is-active' : ''}" type="button"
            style="background:${heatColor(intensity)}"
            ${active ? `data-date="${date}" data-km="${item.km.toFixed(2)}" data-count="${item.count}" aria-label="${date}, ${formatKm(item.km)} km"` : `aria-label="${date}, nessuna attività"`}>
            ${day}
          </button>
        `);
      }
      return `
        <article class="month-card">
          <h3 class="month-name">${label}</h3>
          <div class="days-head"><span>L</span><span>M</span><span>M</span><span>G</span><span>V</span><span>S</span><span>D</span></div>
          <div class="days-grid">${cells.join('')}</div>
        </article>
      `;
    }

    function heatColor(intensity) {
      const t = Math.max(0, Math.min(1, intensity));
      const start = [58, 58, 60];
      const end = [252, 76, 2];
      const rgb = start.map((value, index) => Math.round(value + (end[index] - value) * t));
      return `rgb(${rgb[0]},${rgb[1]},${rgb[2]})`;
    }

    function groupTotals(rows, keyFn) {
      return rows.reduce((acc, row) => {
        const key = keyFn(row);
        if (!acc[key]) acc[key] = { km: 0, dplus: 0, count: 0 };
        acc[key].km += row.distanza;
        acc[key].dplus += row.dislivello;
        acc[key].count += 1;
        return acc;
      }, {});
    }

    function getYears() {
      return [...new Set(state.data.map(row => row.anno))].sort((a, b) => b - a);
    }

    function getDefaultYear() {
      const years = getYears();
      return years.includes(currentYear) ? currentYear : years[0] || currentYear;
    }

    function destroyCharts() {
      Object.values(state.charts).forEach(chart => {
        if (chart) chart.destroy();
      });
      state.charts = {};
    }

    function renderKaren() {
      const allGroups = buildKarenGroups();
      const athletesWithDups = Array.from(new Set(allGroups.flatMap(g => [g.kept?.nome, ...g.dups.map(d => d.nome)].filter(Boolean))))
        .sort((a, b) => state.athletes.indexOf(a) - state.athletes.indexOf(b));
      if (state.karenAthlete !== 'tutti' && !athletesWithDups.includes(state.karenAthlete)) {
        state.karenAthlete = 'tutti';
      }
      const groups = state.karenAthlete === 'tutti'
        ? allGroups
        : allGroups.filter(g => g.kept?.nome === state.karenAthlete || g.dups.some(d => d.nome === state.karenAthlete));
      const intro = `
        <div class="karen-intro">
          <strong>Karen</strong> controlla le uscite che il sistema ha marcato come duplicati.
          Se una è legittima, spunta la casella per riattivarla. La scelta vale per tutti gli utenti.
        </div>
      `;
      const filterHtml = athletesWithDups.length > 1 ? `
        <div id="karenAthletes" class="chip-row">
          ${chipHtml('Tutti', state.karenAthlete === 'tutti', { 'karen-athlete': 'tutti' })}
          ${athletesWithDups.map(name => chipHtml(name, state.karenAthlete === name, { 'karen-athlete': name, color: state.athleteColorMap[name] })).join('')}
        </div>
      ` : '';
      if (!allGroups.length) {
        dom.main.innerHTML = `${intro}<div class="karen-empty">Nessuna uscita scartata 🎉</div>`;
        return;
      }
      if (!groups.length) {
        dom.main.innerHTML = `${intro}${filterHtml}<div class="karen-empty">Nessuna uscita scartata per ${escapeHtml(state.karenAthlete)}.</div>`;
        dom.main.querySelector('#karenAthletes')?.addEventListener('click', onKarenAthleteClick);
        return;
      }
      const html = groups.map(group => {
        const isOpen = state.openKarenGroups.has(group.id);
        const keptHtml = group.kept
          ? `<div class="karen-row karen-row--kept">
              <span class="karen-row__mark" aria-hidden="true">✓</span>
              ${karenRowMain(group.kept)}
              ${karenRowMeta(group.kept, { showFlag: false })}
            </div>`
          : '';
        const dupsHtml = group.dups.map(row => {
          const pending = state.pendingOverrides.has(row.key);
          const override = state.overrideMap.get(row.key);
          const checked = override === true;
          return `
            <label class="karen-row ${pending ? 'karen-row__pending' : ''}">
              <input type="checkbox" class="karen-row__check" data-karen-key="${escapeAttr(row.key)}" ${checked ? 'checked' : ''} ${pending ? 'disabled' : ''}>
              ${karenRowMain(row)}
              ${karenRowMeta(row, { showFlag: true })}
            </label>
          `;
        }).join('');
        return `
          <div class="karen-group">
            <button type="button" class="karen-group__header" data-karen-group="${escapeAttr(group.id)}" aria-expanded="${isOpen}">
              <span>${escapeHtml(group.title)}</span>
              <span class="karen-group__meta">
                <span class="karen-group__count">${group.dups.length}</span>
                <span>${isOpen ? '▲' : '▼'}</span>
              </span>
            </button>
            ${isOpen ? `<div class="karen-group__body">${keptHtml}${dupsHtml}</div>` : ''}
          </div>
        `;
      }).join('');
      dom.main.innerHTML = `${intro}${filterHtml}${html}`;
      dom.main.querySelector('#karenAthletes')?.addEventListener('click', onKarenAthleteClick);
      dom.main.querySelectorAll('[data-karen-group]').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = btn.dataset.karenGroup;
          if (state.openKarenGroups.has(id)) state.openKarenGroups.delete(id);
          else state.openKarenGroups.add(id);
          renderKaren();
        });
      });
      dom.main.querySelectorAll('[data-karen-key]').forEach(input => {
        input.addEventListener('change', event => handleKarenToggle(event.target));
      });
    }

    function onKarenAthleteClick(event) {
      const chip = event.target.closest('.chip');
      if (!chip || !chip.dataset.karenAthlete) return;
      state.karenAthlete = chip.dataset.karenAthlete;
      if (state.karenAthlete !== 'tutti') {
        const groups = buildKarenGroups().filter(g => g.kept?.nome === state.karenAthlete || g.dups.some(d => d.nome === state.karenAthlete));
        groups.forEach(g => state.openKarenGroups.add(g.id));
      }
      renderKaren();
    }

    function buildKarenGroups() {
      const byParent = new Map();
      for (const row of state.allRows) {
        if (isExcludedAthlete(row.nome)) continue;
        if (row.computedFlag !== 'A' && row.computedFlag !== 'N') continue;
        if (!row.parentKey) continue;
        if (!byParent.has(row.parentKey)) byParent.set(row.parentKey, []);
        byParent.get(row.parentKey).push(row);
      }
      const parentIndex = new Map(state.allRows.map(r => [r.key, r]));
      const groups = [];
      for (const [parentKey, dups] of byParent) {
        const kept = parentIndex.get(parentKey);
        if (!kept) continue;
        dups.sort((a, b) => a.date - b.date);
        groups.push({
          id: `P|${parentKey}`,
          title: `${kept.nome} — ${formatDate(kept.date)}`,
          kept,
          dups,
          sortDate: kept.date
        });
      }
      groups.sort((a, b) => b.sortDate - a.sortDate);
      return groups;
    }

    function karenRowMain(row) {
      return `
        <div class="karen-row__main">
          <span class="karen-row__stat">${formatKm(row.distanza)}<small>km</small></span>
          <span class="karen-row__stat">${formatInt(row.dislivello)}<small>D+</small></span>
          <span class="karen-row__stat">${formatKm(row.media)}<small>km/h</small></span>
        </div>
      `;
    }

    function karenRowMeta(row, { showFlag }) {
      const flag = showFlag && row.duplicate ? `<span class="karen-row__flag">${escapeHtml(row.duplicate)}</span>` : '';
      return `
        <div class="karen-row__meta">
          <span>${formatDate(row.date)}</span>
          ${flag}
        </div>
      `;
    }

    async function handleKarenToggle(input) {
      const key = input.dataset.karenKey;
      if (!key || state.pendingOverrides.has(key)) return;
      const desired = input.checked;
      const previous = state.overrideMap.get(key);
      state.pendingOverrides.add(key);
      renderKaren();
      try {
        await postOverride(key, desired);
        state.overrideMap.set(key, desired);
        rebuildActiveRows();
        buildAthletes();
        dom.rowCount.textContent = formatInt(state.data.length);
        showToast(desired ? 'Riattivata' : 'Disattivata', 'ok');
      } catch (error) {
        if (previous === undefined) state.overrideMap.delete(key);
        else state.overrideMap.set(key, previous);
        console.error('[karen] POST override fallito', error);
        showToast('Errore, riprova', 'error');
      } finally {
        state.pendingOverrides.delete(key);
        if (state.tab === 'karen') renderKaren();
        else render();
      }
    }

    async function postOverride(key, included) {
      const controller = new AbortController();
      const timer = window.setTimeout(() => controller.abort(), OVERRIDES_TIMEOUT_MS);
      try {
        await fetch(OVERRIDES_URL, {
          method: 'POST',
          mode: 'no-cors',
          body: JSON.stringify({ key, included, password_hash: EXPECTED_HASH }),
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          signal: controller.signal,
          redirect: 'follow'
        });
        // Apps Script Web Apps redirigono verso googleusercontent senza header CORS:
        // la risposta è opaca in no-cors, non possiamo leggerla.
        // Se la fetch non ha sollevato eccezione, la richiesta è partita.
      } finally {
        window.clearTimeout(timer);
      }
    }

    let toastTimer = null;
    function showToast(message, variant) {
      let node = document.getElementById('toast');
      if (!node) {
        node = document.createElement('div');
        node.id = 'toast';
        node.className = 'toast';
        document.body.appendChild(node);
      }
      node.textContent = message;
      node.className = `toast toast--${variant} is-visible`;
      if (toastTimer) window.clearTimeout(toastTimer);
      toastTimer = window.setTimeout(() => {
        node.classList.remove('is-visible');
      }, 1800);
    }

    function formatKm(value) {
      return Number(value || 0).toLocaleString('it-IT', { minimumFractionDigits: 1, maximumFractionDigits: 1 });
    }

    function formatInt(value) {
      return Math.round(Number(value || 0)).toLocaleString('it-IT');
    }

    function formatDate(date) {
      return date.toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit', year: 'numeric' });
    }

    function hexToRgba(hex, alpha) {
      const value = hex.replace('#', '');
      const r = parseInt(value.slice(0, 2), 16);
      const g = parseInt(value.slice(2, 4), 16);
      const b = parseInt(value.slice(4, 6), 16);
      return `rgba(${r},${g},${b},${alpha})`;
    }

    function emptyHtml(message) {
      return `<div class="empty">${escapeHtml(message)}</div>`;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }
  </script>
</body>
</html>
