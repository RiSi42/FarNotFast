name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write
  deployments: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Inject secrets
        env:
          CSV_URL: ${{ secrets.CSV_URL }}
          OVERRIDES_URL: ${{ secrets.OVERRIDES_URL }}
        run: |
          test -n "$CSV_URL"
          test -n "$OVERRIDES_URL"
          perl -0pi -e 's/\Q__CSV_URL__\E/$ENV{CSV_URL}/g' index.html
          perl -0pi -e 's/\Q__OVERRIDES_URL__\E/$ENV{OVERRIDES_URL}/g' index.html
          ! grep -q "__CSV_URL__" index.html
          ! grep -q "__OVERRIDES_URL__" index.html
      - name: Generate banner list
        run: |
          files=$(ls Banner/*.png Banner/*.jpg Banner/*.jpeg Banner/*.gif Banner/*.webp 2>/dev/null | xargs -I{} basename {} | jq -R . | jq -sc .)
          echo "$files" > Banner/list.json
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

  cleanup:
    needs: deploy
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup old runs, deployments and artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          CURRENT_RUN: ${{ github.run_id }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          # Delete completed workflow runs except current. Leave queued/in-progress runs alone.
          page=1
          while true; do
            ids=$(gh api "repos/${REPO}/actions/runs?page=${page}&per_page=100" --jq '.workflow_runs[] | select(.status == "completed") | .id' 2>/dev/null)
            [ -z "$ids" ] && break
            echo "$ids" | while read id; do
              if [ "$id" != "${CURRENT_RUN}" ]; then
                gh api --method DELETE "repos/${REPO}/actions/runs/$id" 2>/dev/null || true
                echo "Deleted run $id"
              fi
            done
            page=$((page + 1))
          done

          # Delete all deployments except the most recent one
          first=true
          gh api "repos/${REPO}/deployments" --jq '.[].id' 2>/dev/null | while read id; do
            if [ "$first" = true ]; then
              first=false
              echo "Keeping deployment $id"
            else
              if gh api --method POST "repos/${REPO}/deployments/$id/statuses" --field state=inactive 2>/dev/null \
                && gh api --method DELETE "repos/${REPO}/deployments/$id" 2>/dev/null; then
                echo "Deleted deployment $id"
              else
                echo "Skipped deployment $id"
              fi
            fi
          done

          # Delete all artifacts
          gh api "repos/${REPO}/actions/artifacts" --jq '.artifacts[].id' 2>/dev/null | while read id; do
            gh api --method DELETE "repos/${REPO}/actions/artifacts/$id" 2>/dev/null || true
            echo "Deleted artifact $id"
          done
